      :root {
        --teal: #2ba0b8;
        --teal-deep: #1f7e91;
        --jaz-blue: #4c8fa6;
        --sage: #9dae9a;
        --green: #6b9e78; /* saturated logo-sage green — primary "go/purchase" action */
        --green-deep: #4e8560; /* hover / shadow for --green */
        --paper: #fbf8f2;
        --card: #ffffff;
        --ink: #2c3138;
        --ink-soft: #5c636b;
        --line: #e6e0d6;
        --focus: #2ba0b8;
        --accent: #c8703d;
        --accent-deep: #a85a2d; /* warm terracotta — pulled from PDF wood/material tones; used ONLY for the primary Save action so it stands out against the teal UI */
        --serif: "Playfair Display", Georgia, "Times New Roman", serif;
        --sans: "Cabin", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        --maxw: 780px;
        --radius: 14px;
        --gap: 22px;
      }
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--card);
        color: var(--ink);
        font-family: var(--sans);
        font-size: 17px;
        line-height: 1.55;
        -webkit-text-size-adjust: 100%;
      }
      .wrap {
        max-width: var(--maxw);
        margin: 0 auto;
        padding: 0 20px 140px;
      }

      /* ---- Save My Guide chooser (modal) ---- */
      .modal-back {
        position: fixed;
        inset: 0;
        z-index: 60;
        background: rgba(44, 49, 56, 0.45);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .modal-back.open {
        opacity: 1;
        pointer-events: auto;
      }
      .modal {
        background: var(--card);
        border-radius: var(--radius);
        max-width: 440px;
        width: 100%;
        max-height: 90vh;
        overflow: auto;
        box-shadow: 0 20px 60px rgba(44, 49, 56, 0.28);
        transform: translateY(8px);
        transition: transform 0.2s;
        padding: 24px 22px;
      }
      .modal-back.open .modal {
        transform: none;
      }
      .modal h2 {
        font-family: var(--serif);
        font-size: 1.35rem;
        margin: 0 0 4px;
        color: var(--ink);
      }
      .modal .modal-sub {
        color: var(--ink-soft);
        font-size: 0.92rem;
        margin: 0 0 18px;
      }
      .opt-row {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 13px 14px;
        border: 1px solid var(--line);
        border-radius: 11px;
        margin-bottom: 11px;
        cursor: pointer;
        transition:
          border-color 0.15s,
          background 0.15s;
      }
      .opt-row:hover {
        border-color: var(--teal);
      }
      .opt-row.checked {
        border-color: var(--teal);
        background: rgba(43, 160, 184, 0.06);
      }
      .opt-row.disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .opt-row input {
        margin-top: 3px;
        width: 18px;
        height: 18px;
        accent-color: var(--teal);
        flex: 0 0 auto;
      }
      .opt-text {
        flex: 1;
      }
      .opt-text .opt-title {
        font-weight: 600;
        color: var(--ink);
      }
      .opt-text .opt-desc {
        font-size: 0.85rem;
        color: var(--ink-soft);
        margin-top: 2px;
      }
      .opt-text .opt-note {
        font-size: 0.78rem;
        color: var(--accent-deep);
        margin-top: 3px;
        font-style: italic;
      }
      /* contact sub-form, revealed when Send to JAZ is ticked */
      .contact-sub {
        border-left: 3px solid var(--teal);
        padding: 4px 0 4px 14px;
        margin: 2px 0 14px 30px;
        display: none;
      }
      .contact-sub.show {
        display: block;
      }
      .contact-sub label {
        display: block;
        font-size: 0.8rem;
        color: var(--ink-soft);
        margin: 9px 0 3px;
      }
      .contact-sub input,
      .contact-sub textarea {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-family: var(--sans);
        font-size: 0.92rem;
        color: var(--ink);
      }
      .contact-sub .ro {
        background: var(--paper);
        color: var(--ink-soft);
      }
      .contact-row {
        display: flex;
        gap: 10px;
      }
      .contact-row > div {
        flex: 1;
      }
      .modal-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 8px;
      }
      .modal-actions .nav-btn {
        min-width: auto;
      }
      .modal-confirm {
        font-size: 0.85rem;
        color: var(--teal-deep);
        min-height: 1.2em;
        margin-top: 10px;
      }
      .modal-confirm .err {
        color: var(--accent-deep);
      }
      @media (max-width: 480px) {
        .contact-row {
          flex-direction: column;
          gap: 0;
        }
      }

      /* ---- top brand bar ---- */
      .topbar {
        position: sticky;
        top: 0;
        z-index: 40;
        background: rgba(251, 248, 242, 0.92);
        backdrop-filter: saturate(1.2) blur(6px);
        border-bottom: 1px solid var(--line);
      }
      .topbar-inner {
        max-width: var(--maxw);
        margin: 0 auto;
        padding: 12px 20px;
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 9px;
        text-decoration: none;
        flex: 0 0 auto;
      }
      .logo-img {
        height: 34px;
        width: auto;
        display: block;
      }
      .logo small {
        color: var(--green);
        letter-spacing: 0.22em;
        font-weight: 600;
        font-size: 11px;
        align-self: center;
        padding-bottom: 4px;
      }
      @media (max-width: 520px) {
        .logo-img {
          height: 28px;
        }
        .logo small {
          font-size: 10px;
        } /* keep GUIDE label; there's room */
        .topbar-inner {
          gap: 10px;
          padding: 10px 16px;
        }
      }
      .save-btn {
        margin-left: auto;
        border: 1px solid var(--teal-deep);
        background: var(--teal);
        color: #fff;
        font: inherit;
        font-weight: 700;
        font-size: 14px;
        padding: 9px 20px;
        border-radius: 999px;
        cursor: pointer;
        transition: 0.15s;
        letter-spacing: 0.02em;
        box-shadow: 0 2px 8px rgba(43, 160, 184, 0.3);
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .save-btn:hover {
        background: var(--accent);
        border-color: var(--accent-deep);
        box-shadow: 0 3px 12px rgba(200, 112, 61, 0.4);
      }
      .save-btn:active {
        transform: translateY(1px);
      }
      .save-btn[disabled] {
        opacity: 0.5;
        cursor: default;
      }
      /* ambient autosave / sync indicator — informs, never asks for action */
      .sync {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 12.5px;
        color: var(--ink-soft);
        white-space: nowrap;
      }
      .sync-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--sage);
        flex: 0 0 auto;
        transition: 0.2s;
      }
      .sync.saving .sync-dot {
        background: var(--teal);
        animation: pulse 1s ease infinite;
      }
      .sync.unsynced .sync-dot {
        background: var(--accent);
      } /* local-only, not yet on server */
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.35;
        }
      }
      /* Save My Guide button sits after the indicator */
      .topbar-inner .save-btn {
        margin-left: 14px;
      }
      /* when there are local-only (unsynced) changes, the button gains a subtle marker */
      .save-btn.has-changes::after {
        content: "";
        position: absolute;
        top: -3px;
        right: -3px;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--accent);
        border: 2px solid var(--paper);
      }
      .save-btn {
        position: relative;
      }
      @media (max-width: 520px) {
        .topbar-inner {
          gap: 8px;
          padding: 10px 14px;
          flex-wrap: wrap;
        }
        .sync {
          font-size: 11.5px;
          order: 3;
          flex-basis: 100%;
          margin-left: 0;
          margin-top: 2px;
        }
        .save-btn {
          font-size: 13px;
          padding: 8px 16px;
        }
        .topbar-inner .save-btn {
          margin-left: auto;
        }
      }

      /* ---- progress map: the "place setting" rail ---- */
      .progress {
        position: sticky;
        top: 54px;
        z-index: 30;
        background: var(--paper);
        border-bottom: 1px solid var(--line);
        padding: 10px 0;
      }
      .progress-inner {
        max-width: var(--maxw);
        margin: 0 auto;
        padding: 0 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0;
        overflow-x: auto;
        scrollbar-width: none;
      }
      .progress-inner::-webkit-scrollbar {
        display: none;
      }
      .stop {
        display: flex;
        align-items: center;
        gap: 0;
        flex: 0 0 auto;
      }
      .stop button {
        appearance: none;
        border: 0;
        background: none;
        font: inherit;
        cursor: pointer;
        color: var(--ink-soft);
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.02em;
        padding: 6px 4px;
        display: flex;
        align-items: center;
        gap: 8px;
        white-space: nowrap;
      }
      .dot {
        width: 11px;
        height: 11px;
        border-radius: 50%;
        border: 2px solid var(--sage);
        background: var(--paper);
        transition: 0.2s;
      }
      .stop.done .dot {
        background: var(--sage);
        border-color: var(--sage);
      }
      .stop.active .dot {
        background: var(--teal);
        border-color: var(--teal);
        box-shadow: 0 0 0 4px rgba(43, 160, 184, 0.15);
      }
      .stop.active button {
        color: var(--teal);
      }
      .rail {
        width: 34px;
        height: 2px;
        background: var(--line);
        flex: 0 0 auto;
      }
      @media (max-width: 560px) {
        .rail {
          width: 18px;
        }
        .stop button {
          font-size: 12px;
        }
      }

      /* ---- panels ---- */
      /* Real crossfade: panels stack in a positioned container and cross-dissolve.
     display:none can't be transitioned, so we animate opacity/visibility instead
     and let the incoming + outgoing panels briefly overlap. */
      #app {
        position: relative;
      }
      .panel {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: opacity 0.28s ease;
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 0;
        overflow: hidden; /* inactive panels contribute NO page height */
      }
      .panel.active {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        position: relative; /* active panel drives page height */
        height: auto;
        overflow: visible;
        z-index: 1;
      }
      .panel.leaving {
        opacity: 0;
        visibility: visible;
        position: absolute;
        z-index: 0;
        height: auto;
        overflow: hidden; /* still painted during the .28s fade, but abs so no height */
      }
      @keyframes fade {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .section-eyebrow {
        font-size: 12px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--teal);
        font-weight: 700;
        margin: 34px 0 6px;
      }
      h1.section-title {
        font-family: var(--serif);
        font-weight: 700;
        font-size: 30px;
        line-height: 1.15;
        margin: 18px 0 14px;
        color: var(--ink);
      }
      .section-intro {
        color: var(--ink-soft);
        font-size: 16px;
        max-width: 60ch;
        margin: 0 0 8px;
      }
      /* Jaz's inline guidance — styled as a quote callout with a watermark */
      .jaz-note {
        position: relative;
        overflow: hidden;
        margin: 18px auto 0;
        max-width: 64ch;
        background: linear-gradient(135deg, rgba(76, 143, 166, 0.1), rgba(43, 160, 184, 0.05));
        border: 1px solid rgba(76, 143, 166, 0.22);
        border-left: 4px solid var(--jaz-blue);
        border-right: 4px solid var(--jaz-blue);
        border-radius: 12px;
        padding: 20px 24px 16px 58px;
      }
      .jaz-quote-mark {
        position: absolute;
        top: 10px;
        left: 8px;
        width: 46px;
        height: 46px;
        fill: var(--jaz-blue);
        opacity: 0.16;
        pointer-events: none;
      }
      .jaz-note-text {
        position: relative;
        color: var(--jaz-blue);
        font-style: italic;
        font-size: 17px;
        line-height: 1.6;
        margin: 0;
      }
      .jaz-note-attr {
        position: relative;
        margin: 10px 0 0;
        text-align: right;
      }
      .jaz-mark {
        font-style: normal;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: var(--teal-deep);
        font-size: 14px;
        text-transform: uppercase;
      }
      /* 'note'-type jaz slot: plain blue text with stacked, editor-chosen formatting */
      .jaz-simple {
        margin: 14px 0 0;
        max-width: 64ch;
        color: var(--jaz-blue);
        font-size: 16px;
        line-height: 1.6;
      }
      .jaz-simple--large {
        font-size: 19px;
      }
      .jaz-simple--bold {
        font-weight: 700;
      }
      .jaz-simple--italic {
        font-style: italic;
      }
      .jaz-simple--center {
        text-align: center;
      }
      .jaz-simple--bg {
        background: rgba(76, 143, 166, 0.08);
        border-radius: 10px;
        padding: 12px 16px;
      }
      /* G3: a note that is the FIRST element in the field card (jazNoteBefore) drops its
         top margin so only the card's own top padding spaces it. */
      .field > .jaz-note:first-child,
      .field > .jaz-simple:first-child {
        margin-top: 0;
      }
      /* jazNoteBefore (any note that isn't the field's last child) gets bottom spacing
         to separate it from the options below. After-notes stay last -> unaffected. */
      .field > .jaz-note:not(:last-child),
      .field > .jaz-simple:not(:last-child) {
        margin-bottom: 20px;
      }
      @media (max-width: 520px) {
        .jaz-note {
          padding: 16px 16px 12px 48px;
        }
        .jaz-note-text {
          font-size: 15.5px;
        }
        .jaz-quote-mark {
          width: 38px;
          height: 38px;
          top: 8px;
          left: 6px;
        }
      }

      /* Welcome explainer — tinted standout block (echoes the PDF's tinted intro panel) */
      .explainer {
        background: rgba(43, 160, 184, 0.08);
        border: 1px solid rgba(43, 160, 184, 0.25);
        border-radius: var(--radius);
        padding: 22px 24px;
        margin: 26px 0 8px;
      }
      .explainer-h {
        font-family: var(--serif);
        color: var(--teal-deep);
        margin: 0 0 10px;
        font-size: 20px;
      }
      .explainer p {
        margin: 0 0 10px;
        color: var(--ink);
        font-size: 15.5px;
        line-height: 1.55;
      }
      .explainer p:last-child {
        margin-bottom: 0;
      }
      .explainer strong {
        color: var(--accent-deep);
        font-weight: 700;
      }
      /* decorative (non-interactive) button replica inside the explainer: floats
     right-center, copy flows around it on a circular margin */
      .explainer-btn {
        display: inline-flex;
        vertical-align: middle;
        margin: 0 2px;
        cursor: default;
        pointer-events: none;
        user-select: none;
        font-size: 12px;
        font-weight: 600;
        padding: 5px 12px;
        box-shadow: 0 1px 5px rgba(43, 160, 184, 0.25);
      }
      @media (max-width: 520px) {
        .explainer-btn {
          float: none;
          display: block;
          width: fit-content;
          margin: 16px auto 4px;
          shape-outside: none;
        }
      }
      /* centered logo header — DOWNLOADED/finalized file only (not on-site) */
      .dl-logo {
        text-align: center;
        padding: 28px 0 6px;
      }
      .dl-logo-mark {
        width: 120px;
        height: 64px;
        margin: 0 auto 8px;
        border: 1px dashed var(--line);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--sage);
        font-size: 11px;
        padding: 6px;
        text-align: center;
      }
      .dl-logo-name {
        color: var(--teal);
        font-weight: 700;
        letter-spacing: 0.22em;
        font-size: 15px;
      }

      /* ---- cover ---- */
      .cover {
        padding: 48px 0 8px;
        text-align: center;
      }
      .cover .logo-lg {
        font-family: var(--sans);
        font-weight: 700;
        letter-spacing: 0.18em;
        color: var(--teal);
        font-size: 22px;
      }
      .cover .logo-lg small {
        display: block;
        color: var(--sage);
        letter-spacing: 0.3em;
        font-size: 12px;
        font-weight: 600;
        margin-top: 4px;
      }
      .cover h1 {
        font-family: var(--serif);
        font-size: 40px;
        line-height: 1.1;
        margin: 40px 0 20px;
      }
      .cover .for {
        font-family: var(--serif);
        font-style: italic;
        color: var(--ink-soft);
        margin: 0;
      }
      .cover .clarity {
        color: var(--teal);
        letter-spacing: 0.08em;
        font-weight: 600;
        margin: 6px 0 22px;
      }
      .cover-img {
        width: 100%;
        aspect-ratio: 16/10;
        max-height: 360px;
        border-radius: var(--radius);
        object-fit: cover;
        display: block;
        border: 1px solid var(--line);
        background: #ebe7dc;
      }
      .cover .sub {
        font-family: var(--serif);
        font-size: 1.3rem;
        font-style: normal;
        color: var(--jaz-blue);
        max-width: 48ch;
        margin: 22px auto 0;
      }

      /* ---- page 2: introduction ---- */
      .intro-panel {
        background: #abaaa91f;
        border-radius: var(--radius);
        padding: 34px 30px 30px;
        text-align: center;
        margin: 18px 0 26px;
      }
      .intro-lead-it {
        font-family: var(--serif);
        font-style: normal;
        color: var(--jaz-blue);
        font-size: 18px;
        margin: 0 0 10px;
      }
      .intro-lead-big {
        font-family: var(--serif);
        font-style: italic;
        color: var(--teal-deep);
        font-size: 27px;
        line-height: 1.2;
        margin: 0 0 22px;
      }
      .intro-body {
        color: var(--jaz-blue);
        max-width: 52ch;
        margin: 0 auto 14px;
        line-height: 1.6;
      }
      .intro-body-em {
        margin-top: 18px;
      }
      .intro-note-it {
        font-family: var(--serif);
        font-style: italic;
        color: var(--jaz-blue);
        max-width: 46ch;
        margin: 20px auto 24px;
        line-height: 1.5;
      }
      .intro-img {
        width: 100%;
        max-width: 520px;
        aspect-ratio: 16/11;
        object-fit: cover;
        border-radius: 10px;
        display: block;
        margin: 30px auto auto;
        border: 1px solid rgba(0, 0, 0, 0.06);
      }
      .intro-how-h {
        font-family: var(--sans);
        text-align: center;
        color: var(--teal-deep);
        letter-spacing: 0.12em;
        font-size: 15px;
        font-weight: 600;
        margin: 4px 0 14px;
      }
      .intro-how-body {
        color: var(--ink);
        line-height: 1.65;
        max-width: 60ch;
        margin: 0 auto;
      }
      .intro-how-blue {
        color: var(--jaz-blue);
        font-style: italic;
      }
      @media (max-width: 520px) {
        .intro-panel {
          padding: 24px 18px;
        }
        .intro-lead-big {
          font-size: 22px;
        }
      }

      /* ---- email gate ---- */
      .gate {
        background: #c8703d33;
        border: 1px solid var(--accent);
        border-radius: var(--radius);
        padding: 26px;
        margin: 30px 0;
        text-align: center;
      }
      .gate h2 {
        font-family: var(--serif);
        margin: 0 0 8px;
        font-size: 22px;
      }
      .gate p {
        color: var(--ink-soft);
        margin: 0 auto 18px;
        max-width: 46ch;
      }
      .gate .row {
        display: flex;
        gap: 10px;
        max-width: 420px;
        margin: 0 auto;
        flex-wrap: wrap;
      }
      .gate input {
        flex: 1 1 220px;
      }
      .gate .err {
        color: #b4452f;
        font-size: 13px;
        margin-top: 10px;
        min-height: 16px;
      }

      /* ---- fields ---- */
      .field {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 20px 20px 22px;
        margin: var(--gap) 0;
      }
      .field > label.q,
      .field > .q {
        display: block;
        font-weight: 600;
        font-size: 17px;
        margin-bottom: 4px;
      }
      .hint {
        color: var(--ink-soft);
        font-size: 13.5px;
        margin: 0 0 12px;
      }
      textarea,
      input[type="text"],
      input[type="email"] {
        width: 100%;
        font: inherit;
        color: var(--ink);
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 11px 13px;
      }

      textarea::placeholder,
      input[type="text"]::placeholder,
      input[type="email"]::placeholder {
        color: var(--sage);
        opacity: 0.5;
      }

      textarea {
        min-height: 92px;
        resize: vertical;
        line-height: 1.5;
      }
      input:focus,
      textarea:focus {
        outline: none;
        border-color: var(--teal);
        box-shadow: 0 0 0 3px rgba(43, 160, 184, 0.22);
      }
      .opts {
        display: grid;
        gap: 9px;
        margin-top: 6px;
      }
      /* plain checkbox/radio groups flow into columns on wider screens to cut scrolling;
     groups with a trailing input (priority #, $ amount) stay single-column. */
      .opts--cols {
        grid-template-columns: repeat(2, 1fr);
      }
      @media (min-width: 640px) {
        .opts--cols {
          grid-template-columns: repeat(3, 1fr);
        }
      }
      @media (max-width: 480px) {
        .opts--cols {
          grid-template-columns: 1fr;
        }
      }
      .opt {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 9px 11px;
        border: 1px solid var(--line);
        border-radius: 10px;
        cursor: pointer;
        transition: 0.12s;
        background: var(--paper);
      }
      .opt:hover {
        border-color: var(--sage);
      }
      .opt.checked {
        border-color: var(--teal);
        background: rgba(43, 160, 184, 0.06);
      }
      .opt input {
        margin-top: 3px;
        accent-color: var(--teal);
        width: 17px;
        height: 17px;
        flex: 0 0 auto;
      }
      .opt .lab {
        flex: 1;
      }
      /* Item 3: drag-to-reorder priority rows */
      .pri-ranked {
        margin-bottom: 9px;
      }
      .pri-row {
        align-items: center;
        touch-action: none;
        transition:
          transform 0.16s ease,
          box-shadow 0.16s ease;
      }
      .pri-row.dragging {
        border-color: var(--teal);

    <script>
      (function () {
        "use strict";
        var MODEL = JSON.parse(document.getElementById("model").textContent);
        var SEED = JSON.parse(document.getElementById("userdata").textContent || "{}");

        // CONTEXT: the downloaded/finalized file is a standalone document and gets the
        // centered JAZ DESIGN logo header. The on-site embed does NOT (Squarespace page is
        // already branded). The client-side assembly step will set data-context="download"
        // on <html> when it bakes a copy; we also treat a baked-in email (SEED.email) as a
        // download proxy. On-site preview => false.
        var IS_DOWNLOAD =
          document.documentElement.getAttribute("data-context") === "download" || !!(SEED && SEED.email);

        // ---- hosted image URLs (from MODEL.images.urls; editor-driven) ----
        var IMGURLS = (MODEL.images && MODEL.images.urls) || {};
        function imgOf(key) {
          return (IMGURLS[key] && IMGURLS[key].url) || "";
        }
        function imgAltOf(key, fb) {
          return (IMGURLS[key] && IMGURLS[key].alt) || fb || "";
        }
        var IMG = {
          cover: imgOf("cover"),
          intro: imgOf("intro"),
        };

        // ---- state ----
        var LSKEY = "jazguide:data";
        var state = loadState();
        var panels = MODEL.sections.slice(); // includes info sections
        var navStops = MODEL.sections.slice(); // rail shows: intro + all sections (cover added separately)
        var current = 0; // index into panels[]
        var gated = true; // email gate active until email present

        function loadState() {
          var base = { email: "", data: {}, created_at: null, updated_at: null };
          try {
            var ls = JSON.parse(localStorage.getItem(LSKEY) || "null");
            if (ls) return Object.assign(base, ls);
          } catch (e) {}
          if (SEED && SEED.email) {
            return Object.assign(base, SEED);
          } // offline baked-in
          return base;
        }
        function persistLocal() {
          state.updated_at = new Date().toISOString();
          if (!state.created_at) state.created_at = state.updated_at;
          try {
            localStorage.setItem(LSKEY, JSON.stringify(state));
          } catch (e) {}
          flagDirty();
          queueServerSave();
        }

        // ---- helpers ----
        function el(tag, cls, txt) {
          var e = document.createElement(tag);
          if (cls) e.className = cls;
          if (txt != null) e.textContent = txt;
          return e;
        }
        function g(id) {
          return state.data[id];
        }

          if (d !== -1) {

          }

          var n = Number(s);

        function renderCheckboxPriority(f) {
          // Item 3: drag-to-reorder ranking. Order lives in cur.selected (array); the
          // visible number and cur.priority (1..N) derive from that order. No manual
          // number entry. Checked items sit in a draggable "ranked" zone (numbered);
          // unchecked items sit below in an "unranked" zone. Drag uses Pointer Events

          // is unchanged, so the send-guide digest (index.ts) needs no changes.
          var w = el("div", "field");
          w.appendChild(qLabel(f));
          var cur = g(f.id) || { selected: [], priority: {} };
          if (!Array.isArray(cur.selected)) cur.selected = [];
          if (!cur.priority) cur.priority = {};
          // Drop any stored ids no longer in the model, preserving order.
          var validIds = {};
          f.options.forEach(function (o) {

          w.appendChild(unranked);

          function persist() {
            cur.priority = {};
            cur.selected.forEach(function (id, i) {
              cur.priority[id] = i + 1;
            });
            setVal(f.id, cur);
          }

          function paint() {
            ranked.textContent = "";
            unranked.textContent = "";
            cur.selected.forEach(function (id, i) {
              if (validIds[id]) ranked.appendChild(rankedRow(validIds[id], i + 1));
            });
            f.options.forEach(function (o) {
              if (cur.selected.indexOf(o.id) < 0) unranked.appendChild(unrankedRow(o));
            });
          }

          function rankedRow(o, n) {
            var row = el("div", "opt pri-row checked");

            var box = el("input");
            box.type = "checkbox";
            box.checked = true;
            box.addEventListener("change", function () {
              var i = cur.selected.indexOf(o.id);
              if (i >= 0) cur.selected.splice(i, 1);
              persist();
              paint();
            });
            var lab = el("span", "lab", o.label);
            row.appendChild(handle);
            row.appendChild(num);
            row.appendChild(box);
            row.appendChild(lab);
            attachDrag(row, handle);
            return row;
          }

          function unrankedRow(o) {
            var row = el("div", "opt pri-row");
            row.setAttribute("data-id", o.id);
            var box = el("input");
            box.type = "checkbox";
            box.checked = false;
            box.addEventListener("change", function () {
              if (cur.selected.indexOf(o.id) < 0) cur.selected.push(o.id);
              persist();
              paint();
            });
            var lab = el("span", "lab", o.label);
            row.appendChild(box);
            row.appendChild(lab);
            return row;
          }

          var drag = null;
          function attachDrag(row, handle) {
            // Transform-based reorder: the DOM order stays FIXED during the drag.
            // The dragged row is lifted (position:relative + translateY tracking the
            // pointer, no lag). Every OTHER row slides by ±the dragged row's height via
            // a translateY that TRANSITIONS — because these transforms actually change
            // as the target slot changes, the CSS transition animates them smoothly
            // (the old insertBefore approach never changed a transform, so nothing
            // animated). Order is committed to the DOM once, on drop. (S19 rewrite.)
            handle.addEventListener("pointerdown", function (e) {
              e.preventDefault();
              var rows = Array.prototype.slice.call(ranked.children);
              var grabIndex = rows.indexOf(row);
              if (grabIndex < 0) return;
              // First: snapshot live geometry (handles wrapped/variable-height rows).
              var rects = rows.map(function (r) {
                var b = r.getBoundingClientRect();
                return { top: b.top, height: b.height };
              });
              var dragH = rects[grabIndex].height;
              var startY = e.clientY;
              var slot = grabIndex;

              drag = { row: row, rows: rows };
              try {
                row.setPointerCapture(e.pointerId);
              } catch (err) {}
              row.classList.add("dragging");
              // dragged row: no transition, tracks pointer 1:1
              row.style.transition = "none";
              row.style.zIndex = "5";

              function apply() {
                var dy = curY - startY;
                row.style.transform = "translateY(" + dy + "px)";
                // target slot from the dragged center vs each other row's midpoint
                var center = rects[grabIndex].top + dragH / 2 + dy;
                var s = 0;
                for (var k = 0; k < rects.length; k++) {
                  if (k === grabIndex) continue;
                  var mid = rects[k].top + rects[k].height / 2;
                  if (center > mid) s++;
                }
                if (s === slot) return;
                slot = s;
                // shift each other row: rows between old grab spot and the slot open a gap
                rows.forEach(function (r, i) {
                  if (i === grabIndex) return;
                  var shift = 0;
                  if (slot > grabIndex && i > grabIndex && i <= slot) shift = -dragH;
                  else if (slot < grabIndex && i < grabIndex && i >= slot) shift = dragH;
                  r.style.transition = "transform 0.16s ease";
                  r.style.transform = shift ? "translateY(" + shift + "px)" : "";
                });
              }

              var curY = startY;
              function onMove(ev) {
                if (!drag) return;
                ev.preventDefault();
                curY = ev.clientY;
                apply();
              }
              function end() {
                if (!drag) return;
                window.removeEventListener("pointermove", onMove);
                window.removeEventListener("pointerup", end);
                window.removeEventListener("pointercancel", end);
                // clear all inline styles; paint() will rebuild cleanly anyway
                rows.forEach(function (r) {
                  r.style.transition = "";
                  r.style.transform = "";
                  r.style.zIndex = "";
                });
                row.classList.remove("dragging");
                // commit new order: move grabbed id to its slot
                var ids = rows.map(function (r) {
                  return r.getAttribute("data-id");
                });
                var moved = ids.splice(grabIndex, 1)[0];
                ids.splice(slot, 0, moved);
                cur.selected = ids;
                drag = null;
                persist();
                paint();
              }
              window.addEventListener("pointermove", onMove);
              window.addEventListener("pointerup", end);
              window.addEventListener("pointercancel", end);
            });
          }

          paint();
          if (f.other) w.appendChild(otherRow(f.other));
          return w;
        }

        // Normalizes a jaz-slot value to {type,text,...} or null. Accepts:
        //   bare string -> quote (back-compat) · {type:'quote',text} · {type:'note',text,size,styles[],align,bg}
        function normJazNote(v) {
          if (v == null) return null;
          if (typeof v === "string") return v.trim() ? { type: "quote", text: v } : null;
          if (v && v.text != null && String(v.text).trim()) return v;
          return null;
        }
        function jazNoteClasses(n) {
          var c = ["jaz-simple"];
          if (n.size === "large") c.push("jaz-simple--large");

            if (s === "bold") c.push("jaz-simple--bold");
            if (s === "italic") c.push("jaz-simple--italic");
          });
          if (n.align === "center") c.push("jaz-simple--center");
          if (n.bg) c.push("jaz-simple--bg");
          return c.join(" ");

            var foot = el("div", "foot");
            if (ft.url) {
              var a = el("a", "foot-link", ft.text || ft.url);
              a.href = ft.url;
              a.target = "_blank";
              a.rel = "noopener";
              foot.appendChild(a);
            } else {
              foot.textContent = ft.text || "";
            }
            app.appendChild(foot);
          })();

          goTo(gated ? 0 : 1);
          setSync("saved");
        }
        boot();
      })();
    </script>
  </body>
</html>
