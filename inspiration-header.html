<script>
  function gridItemRollover() {
    // Find all portfolio grid items
    const gridItems = document.querySelectorAll("#gridThumbs a.grid-item");

    // Loop through each grid item
    gridItems.forEach(function (gridItem) {
      // Find the portfolio title within this grid item
      const portfolioTitle = gridItem.querySelector("h3.portfolio-title");

      // Find the grid-image div within this grid item
      const gridImage = gridItem.querySelector(".grid-image");

      // Check if both portfolio title and grid-image exist
      if (portfolioTitle && gridImage) {
        // Remember the text content
        const titleText = portfolioTitle.textContent;

        // Create the new rollover div
        const rolloverDiv = document.createElement("div");
        rolloverDiv.className = "inspire-rollover";
        rolloverDiv.textContent = titleText;

        // Prepend the rollover div to the grid-image div
        gridImage.prepend(rolloverDiv);
      }
    });
  }
</script>

<!-- INSPIRATION GALLERY END SLIDE SCRIPT -->
<script>
  // Replace the dummy image with custom end content
  // Detects dummy by filename instead of slide position

  // Configuration - change this to match your dummy image filename
  const DUMMY_IMAGE_FILENAME = "blank-dummy-image.png";

  const jazProjectName = document
    .querySelector("title")
    .textContent.split(" ")[0]; // Get the first word of the title

  let hasReplacedDummy = false;
  let lastSlideIndex = -1;
  let totalSlides = 0;

  function isDummySlide(slideElement) {
    const img = slideElement.querySelector(".gallery-lightbox-item-img img");
    if (!img) {
      return false;
    }

    // Check both src and data-src attributes for the dummy filename
    const src = img.getAttribute("src") || "";
    const dataSrc = img.getAttribute("data-src") || "";

    const hasDummyImage =
      src.includes(DUMMY_IMAGE_FILENAME) ||
      dataSrc.includes(DUMMY_IMAGE_FILENAME);

    return hasDummyImage;
  }

  function manageGalleryControls() {
    const controls = document.querySelector(".gallery-lightbox-controls");
    const replacedSlide = document.querySelector(
      "figure.gallery-lightbox-item.jaz-insp-replaced[data-active='true']"
    );

    if (controls) {
      if (replacedSlide) {
        controls.style.display = "none";
      } else {
        controls.style.display = "";
      }
    }
  }

  function getCurrentActiveSlide() {
    const allSlides = document.querySelectorAll(".gallery-lightbox-item");
    for (let i = 0; i < allSlides.length; i++) {
      if (allSlides[i].getAttribute("data-active") === "true") {
        return { element: allSlides[i], index: i };
      }
    }
    return { element: null, index: -1 };
  }

  function closeLightbox() {
    const closeBtn = document.querySelector(".gallery-lightbox-close-btn");
    if (closeBtn) {
      console.log("Close button found");
      // Restore controls before closing
      const controls = document.querySelector(".gallery-lightbox-controls");
      if (controls) {
        controls.style.display = "";
      }
      closeBtn.click();
    } else {
      console.log("Close button missing");
    }
  }

  function continueToNextSlide() {
    const nextBtn = document.querySelector(
      ".gallery-lightbox-control[data-test='gallery-lightbox-control-next']"
    );
    if (nextBtn) {
      console.log("Next button found");
      // Restore controls before continuing
      const controls = document.querySelector(".gallery-lightbox-controls");
      if (controls) {
        controls.style.display = "";
      }
      nextBtn.click();
    } else {
      console.log("Next button missing");
    }
  }

  function createCustomEndSlideHTML() {
    // check for previoius and next project links
    let prevProjectLink = document.querySelector(".item-pagination-link--prev");
    let nextProjectLink = document.querySelector(".item-pagination-link--next");
    let hasPrevLink = prevProjectLink !== null;
    let hasNextLink = nextProjectLink !== null;

    return `
    <div class="gallery-lightbox-item-wrapper">
      <div class="gallery-lightbox-item-src">
        <div class="gallery-lightbox-item-img content-fit jaz-insp-end-slide">
          <div class="jaz-insp-content-container">
            <h2 class="jaz-insp-title">End of Gallery</h2>
            
            <p class="jaz-insp-description">
              Thanks for viewing project ${jazProjectName}!<br>Ready to explore more of our work?
            <div class="jaz-insp-prev-next">
              ${
                hasPrevLink
                  ? `<a href="${
                      prevProjectLink.href
                    }" class="jaz-insp-btn jaz-insp-btn-secondary">&lt; ${
                      document.querySelector(
                        ".item-pagination-link--prev .item-pagination-title"
                      ).textContent
                    }</a>`
                  : ""
              }
              ${
                hasNextLink
                  ? `<a href="${
                      nextProjectLink.href
                    }" class="jaz-insp-btn jaz-insp-btn-secondary">${
                      document.querySelector(
                        ".item-pagination-link--next .item-pagination-title"
                      ).textContent
                    } &gt;</a>`
                  : ""
              }
                  </div>
            </p>            
            <div class="jaz-insp-button-container">
              <button onclick="continueToNextSlide()" class="jaz-insp-btn jaz-insp-btn-primary">Continue Browsing</button>
              <button onclick="closeLightbox()" class="jaz-insp-btn jaz-insp-btn-tertiary">Close Browsing</button>
              <a href="/inspiration" class="jaz-insp-btn jaz-insp-btn-primary">Inspiration Home</a>                            
              <a href="/contact" class="jaz-insp-btn jaz-insp-btn-tertiary">Contact Us</a>
            </div>
                        
          </div>
        </div>
      </div>
    </div>
  `;
  }

  function replaceDummyImageWithEndContent() {
    const activeSlideData = getCurrentActiveSlide();
    const activeSlide = activeSlideData.element;
    const currentIndex = activeSlideData.index;

    if (!activeSlide) {
      return false;
    }

    // Check if current active slide contains the dummy image
    const isCurrentSlideDummy = isDummySlide(activeSlide);

    // Only proceed if current slide is dummy AND haven't replaced it yet
    if (!isCurrentSlideDummy || hasReplacedDummy) {
      return false;
    }

    // Mark as replaced globally
    hasReplacedDummy = true;
    activeSlide.classList.add("jaz-insp-replaced");

    // Store original content as backup
    //activeSlide.setAttribute("data-original-html", activeSlide.innerHTML);

    // Replace the entire content with our custom HTML
    activeSlide.innerHTML = createCustomEndSlideHTML();

    // Force a style recalculation
    activeSlide.offsetHeight;

    return true;
  }

  function checkAndReplaceIfNeeded() {
    const activeSlideData = getCurrentActiveSlide();
    const currentIndex = activeSlideData.index;

    // Always manage controls based on current state
    manageGalleryControls();

    // If we moved to a different slide, update our tracking
    if (currentIndex !== lastSlideIndex) {
      lastSlideIndex = currentIndex;

      const currentSlide = activeSlideData.element;

      // Reset replacement state if we're not on a replaced slide
      if (
        currentSlide &&
        !currentSlide.classList.contains("jaz-insp-replaced")
      ) {
        hasReplacedDummy = false;
      }

      // Only try to replace if we haven't replaced yet
      if (!hasReplacedDummy) {
        // Try to replace if current slide contains dummy image
        replaceDummyImageWithEndContent();
      }
    }
  }

  // Use a simple interval to check for slide changes
  let slideCheckInterval;

  function startSlideMonitoring() {
    // Clear any existing interval
    if (slideCheckInterval) {
      clearInterval(slideCheckInterval);
    }

    let pollCount = 0;
    const maxPolls = 10;
    const pollInterval = 300;

    function pollForSlides() {
      const initialSlideData = getCurrentActiveSlide();

      if (initialSlideData.element) {
        // Found slides, start monitoring
        lastSlideIndex = initialSlideData.index;
        slideCheckInterval = setInterval(checkAndReplaceIfNeeded, 150);
        return;
      }

      pollCount++;
      if (pollCount >= maxPolls) {
        console.log(
          "Failed to find gallery slides after",
          maxPolls,
          "attempts"
        );
        return;
      }

      // Try again
      setTimeout(pollForSlides, pollInterval);
    }

    // Start polling immediately
    pollForSlides();
  }

  function stopSlideMonitoring() {
    if (slideCheckInterval) {
      clearInterval(slideCheckInterval);
      slideCheckInterval = null;
    }
    // Reset gallery controls and state when stopping monitoring
    const controls = document.querySelector(".gallery-lightbox-controls");
    if (controls) {
      controls.style.display = "";
    }
    hasReplacedDummy = false;
  }

  // Event delegation for gallery links
  function setupGalleryLinkListeners() {
    document.addEventListener("click", function (e) {
      if (e.target.closest(".gallery-masonry-lightbox-link")) {
        // Reset state for new lightbox session
        hasReplacedDummy = false;
        lastSlideIndex = -1;
        totalSlides = 0;

        // Start monitoring after lightbox loads
        startSlideMonitoring();
      }
    });

    // Listen for lightbox close to clean up
    document.addEventListener("click", function (e) {
      if (
        e.target.closest(".gallery-lightbox-wrapper") &&
        e.target.classList.contains("gallery-lightbox-wrapper")
      ) {
        stopSlideMonitoring();
      }
    });

    // Listen for escape key
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") {
        stopSlideMonitoring();
      }
    });
  }

  // Make functions globally available
  window.closeLightbox = closeLightbox;
  window.continueToNextSlide = continueToNextSlide;
</script>

<!-- INSPIRATION GLOBAL SCRIPT INITIALIZATION -->
<script>
  // Wait for DOM to be ready and run multiple functions
  function runInitializers() {
    gridItemRollover();
    setupGalleryLinkListeners();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", runInitializers);
  } else {
    // DOM already loaded
    runInitializers();
  }
</script>

<script>
  // Add slide number bugs to gallery lightbox items - separate monitoring system

  let slideNumberBugs = [];
  let isLightboxActive = false;
  let lightboxMonitorInterval;
  let lastActiveSlideIndex = -1;

  function isLightboxVisible() {
    const lightboxWrapper = document.querySelector(".gallery-lightbox-wrapper");
    if (!lightboxWrapper) return false;

    const style = window.getComputedStyle(lightboxWrapper);
    return style.display !== "none" && style.visibility !== "hidden";
  }

  function hasVisibleDimensions(element) {
    const rect = element.getBoundingClientRect();
    return rect.width > 0 && rect.height > 0;
  }

  function getImageDimensions(img) {
    // Try data-image-dimensions first
    const imageDimensions = img.getAttribute("data-image-dimensions");
    if (imageDimensions) {
      const [width, height] = imageDimensions.split("x").map(Number);
      if (width && height) return { width, height };
    }

    // Try width/height attributes
    const widthAttr = parseInt(img.getAttribute("width"));
    const heightAttr = parseInt(img.getAttribute("height"));
    if (widthAttr && heightAttr)
      return { width: widthAttr, height: heightAttr };

    // Try natural dimensions if loaded
    if (img.complete && img.naturalWidth && img.naturalHeight) {
      return { width: img.naturalWidth, height: img.naturalHeight };
    }

    return null;
  }

  function calculateImageBounds(containerRect, imageDimensions) {
    const containerWidth = containerRect.width;
    const containerHeight = containerRect.height;
    const containerAspectRatio = containerWidth / containerHeight;
    const imageAspectRatio = imageDimensions.width / imageDimensions.height;

    let imageWidth, imageHeight, imageLeft, imageTop;

    if (imageAspectRatio > containerAspectRatio) {
      // Image is wider - fits to container width, letterboxed vertically
      imageWidth = containerWidth;
      imageHeight = containerWidth / imageAspectRatio;
      imageLeft = 0;
      imageTop = (containerHeight - imageHeight) / 2;
    } else {
      // Image is taller - fits to container height, pillarboxed horizontally
      imageHeight = containerHeight;
      imageWidth = containerHeight * imageAspectRatio;
      imageTop = 0;
      imageLeft = (containerWidth - imageWidth) / 2;
    }

    return {
      left: imageLeft,
      top: imageTop,
      width: imageWidth,
      height: imageHeight,
      right: imageLeft + imageWidth,
      bottom: imageTop + imageHeight,
    };
  }

  function positionBug(bug, container, imageBounds) {
    // Position bug at top-right of actual image with ~20px margin
    const marginFromEdge = 20;

    // Get the bug's actual rendered width
    const bugRect = bug.getBoundingClientRect();
    const bugWidth = bugRect.width;

    // Calculate position from top-left of container
    // Subtract bug width so the right edge is positioned with margin, not left edge
    const bugLeft = imageBounds.right - marginFromEdge - bugWidth;
    const bugTop = imageBounds.top + marginFromEdge;

    // Use transform for precise positioning
    bug.style.position = "absolute";
    bug.style.left = "0";
    bug.style.top = "0";
    bug.style.transform = `translate(${bugLeft}px, ${bugTop}px)`;
    bug.style.transformOrigin = "top left";
  }

  function updateBugPosition(bugData) {
    const container = bugData.slide.querySelector(".gallery-lightbox-item-src");
    if (!container || !hasVisibleDimensions(container)) {
      return false;
    }

    const imageDimensions = getImageDimensions(bugData.image);
    if (!imageDimensions) {
      console.log("Could not get image dimensions for bug positioning");
      return false;
    }

    const containerRect = container.getBoundingClientRect();
    const imageBounds = calculateImageBounds(containerRect, imageDimensions);

    positionBug(bugData.bug, container, imageBounds);
    return true;
  }

  function updateAllBugPositions() {
    slideNumberBugs.forEach((bugData) => {
      updateBugPosition(bugData);
    });
  }

  function createSlideNumberBugs() {
    const allSlides = document.querySelectorAll(".gallery-lightbox-item");
    if (allSlides.length === 0) return;

    // Clear existing bugs
    slideNumberBugs.forEach((bugData) => {
      if (bugData.bug.parentNode) {
        bugData.bug.parentNode.removeChild(bugData.bug);
      }
    });
    slideNumberBugs = [];

    // Total count excludes the last slide (dummy/replacement slide)
    const totalSlides = allSlides.length - 1;

    // Add number bugs to all slides except the last one
    for (let i = 0; i < totalSlides; i++) {
      const slide = allSlides[i];
      const slideContainer = slide.querySelector(".gallery-lightbox-item-img");
      const slideImage = slide.querySelector(".gallery-lightbox-item-img img");

      if (!slideContainer || !slideImage) continue;

      // Create the slide number bug
      const slideBug = document.createElement("div");
      slideBug.className = "jaz-slide-number-bug";
      slideBug.textContent = `${i + 1} of ${totalSlides}`;

      // Store reference
      const bugData = {
        bug: slideBug,
        container: slideContainer,
        image: slideImage,
        slide: slide,
        slideIndex: i,
      };
      slideNumberBugs.push(bugData);

      // Add to DOM
      slideContainer.appendChild(slideBug);

      // Try to position immediately
      updateBugPosition(bugData);
    }

    console.log(`Created slide number bugs for ${totalSlides} slides`);
  }

  function getCurrentActiveSlideIndex() {
    const allSlides = document.querySelectorAll(".gallery-lightbox-item");
    for (let i = 0; i < allSlides.length; i++) {
      if (allSlides[i].getAttribute("data-active") === "true") {
        return i;
      }
    }
    return -1;
  }

  function checkLightboxState() {
    const lightboxVisible = isLightboxVisible();
    const currentActiveSlide = getCurrentActiveSlideIndex();

    // Lightbox opened
    if (lightboxVisible && !isLightboxActive) {
      isLightboxActive = true;
      console.log("Lightbox opened, creating slide number bugs");

      // Wait a moment for elements to fully render
      setTimeout(() => {
        createSlideNumberBugs();
        updateAllBugPositions();
      }, 100);
    }

    // Lightbox closed
    if (!lightboxVisible && isLightboxActive) {
      isLightboxActive = false;
      lastActiveSlideIndex = -1;
      console.log("Lightbox closed");
    }

    // Slide changed while lightbox is active
    if (isLightboxActive && currentActiveSlide !== lastActiveSlideIndex) {
      lastActiveSlideIndex = currentActiveSlide;
      console.log("Slide changed to:", currentActiveSlide);

      // Recalculate positions when slide changes
      setTimeout(() => {
        updateAllBugPositions();
      }, 50);
    }
  }

  function handleResize() {
    if (isLightboxActive) {
      updateAllBugPositions();
    }
  }

  function startMonitoring() {
    // Monitor lightbox state
    lightboxMonitorInterval = setInterval(checkLightboxState, 200);

    // Handle window resize
    let resizeTimeout;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(handleResize, 150);
    });

    console.log("Slide number bug monitoring started");
  }

  function stopMonitoring() {
    if (lightboxMonitorInterval) {
      clearInterval(lightboxMonitorInterval);
      lightboxMonitorInterval = null;
    }
  }

  // Initialize when DOM is ready
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", startMonitoring);
  } else {
    startMonitoring();
  }
</script>
